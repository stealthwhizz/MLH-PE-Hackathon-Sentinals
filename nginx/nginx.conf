worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 5m;

    # Standard request timeout tuning for short-link APIs.
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    send_timeout 30s;

    # Enable gzip for text payloads including Prometheus exposition format.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Structured JSON logs for downstream parsing and incident triage.
    log_format ghostlink_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_id":"$request_id",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log ghostlink_json;
    error_log /var/log/nginx/error.log warn;

    upstream ghostlink_backend {
        server app1:5000;
        server app2:5000;
        keepalive 64;
    }

    # Per-IP protection baseline: 10 requests/second with bounded bursting.
    limit_req_zone $binary_remote_addr zone=ghostlink_per_ip:10m rate=10r/s;

    # App can append deny regex lines (e.g. ~^/abc123$ 1;) into blocked_codes.conf.
    map $uri $blocked_short_code {
        default 0;
        include /etc/nginx/blocked_codes.conf;
    }

    server {
        listen 80;
        server_name _;
        error_page 410 = @quarantined_code_json;

        # Future controls can add dedicated route-level rate buckets here.
        limit_req zone=ghostlink_per_ip burst=20 nodelay;

        if ($blocked_short_code = 1) {
            return 410;
        }

        location @quarantined_code_json {
            default_type application/json;
            add_header Cache-Control "no-store" always;
            return 410 '{"error":"This short code has been quarantined due to suspicious activity"}';
        }

        # Canary short codes verify user-facing routes every minute.
        location ~ ^/(health-demo|promo-demo|checkout-demo|dashboard-demo|support-demo)$ {
            rewrite ^ /health break;
            proxy_pass http://ghostlink_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /health {
            proxy_pass http://ghostlink_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /metrics {
            proxy_pass http://ghostlink_backend/metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_http_version 1.1;
            proxy_pass http://ghostlink_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
        }
    }
}
